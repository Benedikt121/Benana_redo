<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Headless MusicKit Bridge</title>
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
  </head>
  <body>
    <script>
      let music;
      window.parent.postMessage({ type: "IFRAME_PING" }, "*");

      let musickitLoadedSent = false;
      const sendLoaded = () => {
        if (musickitLoadedSent) return;
        musickitLoadedSent = true;
        window.parent.postMessage({ type: "MUSICKIT_LOADED" }, "*");
      };

      window.addEventListener("musickitloaded", () => {
        sendLoaded();
      });

      // Check if already loaded
      if (window.MusicKit) {
        sendLoaded();
      }

      window.addEventListener("message", async (event) => {
        const { type, payload } = event.data;

        try {
          if (type === "CONFIGURE") {
            await MusicKit.configure({
              developerToken: payload.token,
              musicUserToken: payload.musicUserToken,
              app: { name: "Benana", build: "1.0.0" },
            });
            music = MusicKit.getInstance();
            window.parent.postMessage({ type: "CONFIGURED" }, "*");

            // Listen to native MusicKit events and forward them to React
            if (!window.listenersAdded && music) {
              music.addEventListener(
                MusicKit.Events.playbackStateDidChange,
                (e) => {
                  window.parent.postMessage(
                    { 
                      type: "PLAYBACK_STATE_CHANGED", 
                      state: e.state,
                      currentPlaybackTime: music.currentPlaybackTime
                    },
                    "*",
                  );
                },
              );

              music.addEventListener(
                MusicKit.Events.nowPlayingItemDidChange,
                () => {
                  if (music.nowPlayingItem) {
                    window.parent.postMessage(
                      {
                        type: "NOW_PLAYING",
                        item: {
                          id: music.nowPlayingItem.id,
                          ...music.nowPlayingItem.attributes,
                        },
                        currentPlaybackTime: music.currentPlaybackTime
                      },
                      "*",
                    );
                  }
                },
              );
              window.listenersAdded = true;
            }
          }

          if (!music && type !== "CONFIGURE") {
             // Silently ignore or queue if not configured yet
             return;
          }

          if (type === "AUTHORIZE") {
            await music.authorize();
            window.parent.postMessage(
              { type: "AUTHORIZED", token: music.musicUserToken },
              "*",
            );
          }

          if (type === "PLAY_SONG") {
            await music.setQueue({
              songs: [payload.songId],
              startPlaying: true,
            });
            await music.play();
          }

          if (type === "PLAY_PLAYLIST") {
            await music.setQueue({
              playlist: payload.playlistId,
              startPlaying: true,
            });
            await music.play();
          }

          if (type === "PAUSE") await music.pause();
          if (type === "RESUME") await music.play();
          if (type === "SKIP_NEXT") await music.skipToNextItem();
          if (type === "SKIP_PREV") await music.skipToPreviousItem();
          if (type === "SEEK") {
            await music.seekToTime(payload.time);
          }
          if (type === "SET_VOLUME") {
            music.volume = payload.volume;
          }

          if (type === "FETCH_PLAYLISTS") {
            // If not authorized, trigger the login popup
            if (!music.musicUserToken || !music.isAuthorized) {
              await music.authorize();
              window.parent.postMessage(
                { type: "AUTHORIZED", token: music.musicUserToken },
                "*",
              );
            }

            const response = await music.api.music("v1/me/library/playlists");
            const playlistArray = response.data.data || [];

            window.parent.postMessage(
              { type: "PLAYLISTS_FETCHED", playlists: playlistArray },
              "*",
            );
          }
        } catch (err) {
          console.error("[MusicKit Bridge Error]", err);
          window.parent.postMessage(
            { type: "ERROR", message: err.message },
            "*",
          );
        }
      });
    </script>
  </body>
</html>
