$kind: http-request
name: Auth - Register
url: "{{baseUrl}}/auth/register"
method: POST
body:
  type: json
  content: |-
    {
      "username": "TestUser",
      "clientPasswordHash": "Test123"
    }
scripts:
  - type: afterResponse
    code: "var jsonData = pm.response.json();\r

      \r

      pm.environment.set(\"token\", jsonData.token);"
    language: text/javascript
order: 1000
