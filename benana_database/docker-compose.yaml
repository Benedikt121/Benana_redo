services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: benana_dev
    ports:
      - "3307:3306"
  redis:
    image: redis:alpine
    container_name: benana_redis
    ports:
      - "6379:6379"
    restart: unless-stopped